<style>

    --gold:#FFD700;--red:#E63946;--green:#2DC653;--orange:#FF6B35;

  /* LOADING */
  #loading-screen{
    position:fixed;inset:0;background:var(--bg);z-index:999;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  }
  .spinner{width:48px;height:48px;border:4px solid rgba(255,107,53,0.2);
    border-top-color:var(--orange);border-radius:50%;animation:spin 0.8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* HEADER */
  header{
    background:linear-gradient(135deg,#0A1628,#1a2a4a,#0A1628);
    border-bottom:3px solid var(--orange);padding:14px 16px;
    position:sticky;top:0;z-index:100;
    display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
  }
  header h1{
    font-family:'Bangers',cursive;font-size:1.6rem;letter-spacing:2px;
    background:linear-gradient(135deg,var(--orange),var(--gold));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  }
  .header-btns{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .stat-chip{
    background:rgba(255,107,53,0.12);border:1.5px solid var(--orange);
    border-radius:20px;padding:4px 12px;font-size:0.78rem;font-weight:800;
    color:var(--orange);white-space:nowrap;display:flex;align-items:center;gap:5px;
  }
  .sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .sync-dot.syncing{background:var(--gold);animation:pulse 1s infinite}
  .sync-dot.ok{background:var(--green)}
  .sync-dot.error{background:var(--red)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  .btn-add{
    background:linear-gradient(135deg,#2DC653,#00B4D8);border:none;border-radius:20px;
    padding:7px 16px;font-size:0.82rem;font-weight:800;color:white;cursor:pointer;
    font-family:'Nunito',sans-serif;white-space:nowrap;transition:all 0.2s;
  }
  .btn-add:hover{transform:scale(1.05)}
  .btn-share{
    background:linear-gradient(135deg,#FF6B35,#E63946);border:none;border-radius:20px;
    padding:7px 16px;font-size:0.82rem;font-weight:800;color:white;cursor:pointer;
    font-family:'Nunito',sans-serif;white-space:nowrap;transition:all 0.2s;
  }
  .btn-share:hover{transform:scale(1.05)}

  /* CARDS LIST */
  .cards-list{padding:16px}

  .grp-divider{
    display:flex;align-items:center;gap:10px;margin:20px 0 8px;
    font-family:'Bangers',cursive;font-size:1rem;letter-spacing:2px;
  }

  .dbl-row{
    background:var(--card-bg);border-radius:14px;margin-bottom:10px;
    border:1.5px solid rgba(255,255,255,0.08);display:flex;align-items:center;
    padding:10px 14px;gap:12px;transition:border-color 0.2s;
  }
  .dbl-row:hover{border-color:rgba(255,255,255,0.2)}
  .dbl-badge{
    width:52px;height:52px;border-radius:12px;flex-shrink:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    box-shadow:0 3px 10px rgba(255,107,53,0.35);

  .dbl-badge .b-code{font-size:0.6rem;font-weight:900;color:rgba(0,0,0,0.6);letter-spacing:0.5px}
  .dbl-badge .b-num{font-size:1rem;font-weight:900;color:#000;line-height:1}
  .dbl-info{flex:1;min-width:0}
  .dbl-info .d-team{font-weight:900;font-size:0.9rem;display:flex;align-items:center;gap:6px}
  .dbl-info .d-card{font-size:0.78rem;color:var(--muted);margin-top:2px}
  .dbl-counter{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .cnt-btn{

  .empty-state{text-align:center;padding:50px 20px;color:var(--muted)}

// ── State ──────────────────────────────────────────────────────────────────
let doubles = {};
let saveTimer = null;
let isRemoteUpdate = false;

function key(code,s){ return `${code}__${s}`; }
function setSyncDot(state){ document.getElementById('sync-dot').className='sync-dot '+state; }
function findTeam(code){ return ALL_DATA.find(t=>t.code===code); }

// ── Firebase : écoute temps réel ──────────────────────────────────────────
onSnapshot(DOC_REF, (snap) => {
  if(!snap.exists()) return;
  const remote = snap.data().doubles || {};
  if(JSON.stringify(remote) === JSON.stringify(doubles)) return;
  isRemoteUpdate = true;
  doubles = remote;
  renderList();
  updateStats();
  isRemoteUpdate = false;
  setSyncDot('ok');
});

// ── Firebase : sauvegarde ─────────────────────────────────────────────────
async function saveToFirebase(){
  setSyncDot('syncing');
  try {
    await setDoc(DOC_REF, { doubles, updatedAt: Date.now() });
    setSyncDot('ok');
  } catch(e){ console.error(e); setSyncDot('error'); }
}
function scheduleSave(){
  if(isRemoteUpdate) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveToFirebase, 1500);
}

// ── Init ──────────────────────────────────────────────────────────────────
async function init(){
  setSyncDot('syncing');
  try {
    const snap = await getDoc(DOC_REF);
    if(snap.exists()){
      doubles = snap.data().doubles || {};
    } else {
      // Premier chargement : injecter les doubles initiaux
      doubles = {};
      INITIAL.forEach(({code,s}) => {
        const k = key(code,s);
        doubles[k] = (doubles[k]||0) + 1;
      });
      await saveToFirebase();
    }
    setSyncDot('ok');
  } catch(e){ console.error(e); setSyncDot('error'); doubles={}; }
  renderList();
  updateStats();
  document.getElementById('loading-screen').style.display='none';
}

// ── Stats ─────────────────────────────────────────────────────────────────
function getTotalDoubles(){ return Object.values(doubles).reduce((s,v)=>s+v,0); }
function updateStats(){
  const total = getTotalDoubles();
  document.getElementById('stat-total').textContent = `${total} double${total!==1?'s':''}`;
}

// ── Render liste ──────────────────────────────────────────────────────────
function renderList(){
  const container = document.getElementById('cards-list');
  container.innerHTML = '';

  const entries = [];
  ALL_DATA.forEach(team => {
    team.stickers.forEach(s => {
      const k = key(team.code,s);
      if((doubles[k]||0)>0) entries.push({code:team.code,flag:team.flag,group:team.group,s,count:doubles[k]});
    });
  });

  if(!entries.length){
    container.innerHTML=`<div class="empty-state">
      <div>🃏</div><p>Aucun double enregistré pour l'instant.</p>
      <button onclick="openAddModal()">➕ Ajouter un double</button></div>`;
    return;
  }

  const byGroup = {};
  entries.forEach(e => { if(!byGroup[e.group]) byGroup[e.group]=[]; byGroup[e.group].push(e); });

  const groupOrder=['SPÉCIALES','A','B','C','D','E','F','G','H','I','J','K','L','FWC'];
  groupOrder.forEach(grp => {
    if(!byGroup[grp]) return;
    const color = GROUP_COLORS[grp]||'#666';
    const grpTotal = byGroup[grp].reduce((s,e)=>s+e.count,0);

    const div = document.createElement('div');
    div.className='grp-divider';
    div.style.color=color;
    div.innerHTML=`
      <div class="line" style="background:${color}44"></div>
      ${grp==='SPÉCIALES'?'⭐ SPÉCIALES':grp==='FWC'?'🏆 FWC':`GROUPE ${grp}`}
      <span style="font-family:Nunito,sans-serif;font-size:0.72rem;font-weight:800;
        background:${color}22;border:1px solid ${color}66;border-radius:10px;padding:2px 8px;color:${color};">
        ${grpTotal} double${grpTotal>1?'s':''}</span>
      <div class="line" style="background:${color}44"></div>`;
    container.appendChild(div);

    byGroup[grp].forEach(e => {
      const row = document.createElement('div');
      row.className='dbl-row'; row.id=`row-${key(e.code,e.s)}`;
      const color2 = GROUP_COLORS[e.group]||'#FF6B35';
      row.innerHTML=`
        <div class="dbl-badge" style="background:linear-gradient(135deg,${color2},${color2}aa);">
          <div class="b-code">${e.code}</div>
          <div class="b-num">${e.s}</div>
        </div>
        <div class="dbl-info">
          <div class="d-team">${e.flag} <strong>${e.code}</strong></div>
          <div class="d-card">Carte n° ${e.s}</div>
        </div>
        <div class="dbl-counter">
          <button class="cnt-btn minus" onclick="adjust('${e.code}','${e.s}',-1)">−</button>
          <div class="cnt-display" id="cnt-${key(e.code,e.s)}">${e.count}</div>
          <button class="cnt-btn plus"  onclick="adjust('${e.code}','${e.s}',+1)">+</button>
        </div>
        <button class="del-btn" onclick="deleteCard('${e.code}','${e.s}')" title="Supprimer">🗑</button>`;
      container.appendChild(row);
    });
  });
}

// ── Adjust ────────────────────────────────────────────────────────────────
window.adjust = function(code,s,delta){
  const k=key(code,s);
  const newVal=(doubles[k]||0)+delta;
  if(newVal<=0){ deleteCard(code,s); return; }
  doubles[k]=newVal;
  const el=document.getElementById(`cnt-${k}`);
  if(el) el.textContent=newVal;
  updateStats(); scheduleSave();
};
window.deleteCard = function(code,s){
  const k=key(code,s);
  delete doubles[k];
  renderList(); updateStats(); scheduleSave();
};

// ── Add modal ─────────────────────────────────────────────────────────────
window.openAddModal = function(){
  document.getElementById('add-modal').classList.add('open');
  document.getElementById('add-search').value='';
  renderAddList();
  setTimeout(()=>document.getElementById('add-search').focus(),100);
};
window.closeAddModal = function(){ document.getElementById('add-modal').classList.remove('open'); };

window.renderAddList = function(){
  const q=document.getElementById('add-search').value.toLowerCase();
  const container=document.getElementById('add-list');
  container.innerHTML='';
  const groupOrder=['SPÉCIALES','A','B','C','D','E','F','G','H','I','J','K','L','FWC'];
  const grouped={};
  ALL_DATA.forEach(t=>{
    if(q && !t.code.toLowerCase().includes(q) && !t.group.toLowerCase().includes(q)) return;
    if(!grouped[t.group]) grouped[t.group]=[];
    grouped[t.group].push(t);
  });
  groupOrder.forEach(grp=>{
    if(!grouped[grp]) return;
    const color=GROUP_COLORS[grp]||'#666';
    const section=document.createElement('div');
    section.className='team-section';
    let teamsHTML='';
    grouped[grp].forEach(t=>{
      const pills=t.stickers.map(s=>{
        const k=key(t.code,s);
        const already=(doubles[k]||0)>0;
        return `<span class="s-pill ${already?'already':''}"
          onclick="addDouble('${t.code}','${s}')"
          title="${already?`Déjà ${doubles[k]}× — clic pour ajouter`:'Ajouter'}">
          ${s}${already?' ×'+doubles[k]:''}
        </span>`;
      }).join('');
      teamsHTML+=`<div style="margin-bottom:10px;">
        <div class="team-section-hd">${t.flag} ${t.code}</div>
        <div class="sticker-pills">${pills}</div></div>`;
    });
    section.innerHTML=`
      <div style="font-family:Bangers,cursive;font-size:0.95rem;letter-spacing:2px;
        color:${color};margin:12px 0 6px;padding:4px 10px;
        background:${color}18;border-radius:6px;border-left:3px solid ${color};">
        ${grp==='SPÉCIALES'?'⭐ SPÉCIALES':grp==='FWC'?'🏆 FWC':`GROUPE ${grp}`}
      </div>${teamsHTML}`;
    container.appendChild(section);
  });
  if(!container.innerHTML)
    container.innerHTML=`<p style="color:var(--muted);text-align:center;padding:20px;">Aucune équipe trouvée.</p>`;
};

window.addDouble = function(code,s){
  const k=key(code,s);
  doubles[k]=(doubles[k]||0)+1;
  renderList(); updateStats(); scheduleSave(); renderAddList();
};

// ── Share modal ───────────────────────────────────────────────────────────
window.openShareModal = function(){
  if(!getTotalDoubles()){ alert('Tu n\'as encore aucun double enregistré !'); return; }
  const lines=['⚽ MES DOUBLES — Panini Coupe du Monde','🤝 Contacte-moi si tu veux échanger !\n'];
  const groupOrder=['SPÉCIALES','A','B','C','D','E','F','G','H','I','J','K','L','FWC'];
  const byGroup={};
  ALL_DATA.forEach(team=>{
    team.stickers.forEach(s=>{
      const k=key(team.code,s);
      if((doubles[k]||0)>0){
        if(!byGroup[team.group]) byGroup[team.group]={};
        if(!byGroup[team.group][team.code]) byGroup[team.group][team.code]={flag:team.flag,items:[]};
        byGroup[team.group][team.code].items.push({s,count:doubles[k]});
      }
    });
  });
  groupOrder.forEach(grp=>{
    if(!byGroup[grp]) return;
    lines.push(grp==='SPÉCIALES'?'⭐ SPÉCIALES :':grp==='FWC'?'🏆 FWC :':`— GROUPE ${grp} —`);
    Object.entries(byGroup[grp]).forEach(([code,data])=>{
      const parts=data.items.map(({s,count})=>count>1?`${s}(×${count})`:`${s}`);
      lines.push(`  ${data.flag} ${code} : ${parts.join(', ')}`);
    });
    lines.push('');
  });
  document.getElementById('share-text').textContent=lines.join('\n').trim();
  document.getElementById('copy-btn').textContent='📋 Copier la liste';
  document.getElementById('share-modal').classList.add('open');
};
window.closeShareModal = function(){ document.getElementById('share-modal').classList.remove('open'); };
window.copyShare = function(){
  navigator.clipboard.writeText(document.getElementById('share-text').textContent).then(()=>{
    const btn=document.getElementById('copy-btn');
    btn.textContent='✅ Copié ! Colle dans WhatsApp ou SMS';
    setTimeout(()=>{ btn.textContent='📋 Copier la liste'; },3000);
  });
};

// Close modals on overlay click
document.getElementById('add-modal').addEventListener('click',function(e){ if(e.target===this) closeAddModal(); });
document.getElementById('share-modal').addEventListener('click',function(e){ if(e.target===this) closeShareModal(); });

// ── GO ────────────────────────────────────────────────────────────────────
init();
</script>
